name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Gradle Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Validate repository metadata
        run: |
          python3 - <<'PY'
          from pathlib import Path

          for path in Path(".").rglob("*"):
              if path.suffix not in {".yml", ".yaml"}:
                  continue
              if "build" in path.parts or ".gradle" in path.parts or ".gradle-user-home" in path.parts:
                  continue
              text = path.read_text(encoding="utf-8")
              if "\t" in text:
                  raise SystemExit(f"{path}: YAML contains a tab")
              if not text.endswith("\n"):
                  raise SystemExit(f"{path}: missing trailing newline")
              for line_number, line in enumerate(text.splitlines(), 1):
                  if len(line) > 500:
                      raise SystemExit(f"{path}:{line_number}: line exceeds 500 characters")

          print("YAML structure check passed")
          PY
          test -f README.md
          test -f src/main/resources/plugin.yml
          awk 'length($0) > 500 { print FILENAME ":" FNR ": line exceeds 500 characters"; failed = 1 } END { exit failed }' README.md CHANGELOG.md CONTRIBUTING.md SECURITY.md SUPPORT.md

      - name: Build
        run: ./gradlew clean test build

      - name: Upload plugin jar
        uses: actions/upload-artifact@v7
        with:
          name: Mercatus
          path: build/libs/Mercatus-*.jar
          if-no-files-found: error
